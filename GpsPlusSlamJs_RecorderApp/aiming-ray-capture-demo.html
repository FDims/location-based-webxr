<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aiming Ray Capture Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: rgb(0 0 0 / 75%);
      --border: rgb(255 255 255 / 45%);
      --accent: #ff2b2b;
      --text: #f5f5f5;
      --muted: #b8b8b8;
    }

    body {
      font-family: 'Space Mono', monospace; background: var(--bg); color: var(--text);
      height: 100dvh; display: grid; grid-template-rows: auto 1fr; overflow: hidden;
    }

    header {
      display: flex; align-items: center; gap: 12px; padding: 12px 20px;
      border-bottom: 1px solid var(--border); background: rgb(0 0 0 / 90%);
    }
    header h1 { font-size: 14px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    header p { font-size: 11px; color: var(--muted); }
    .hdot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px rgb(255 43 43 / 80%); }

    main { position: relative; overflow: hidden; background: #000; cursor: crosshair; }
    canvas { display: block; width: 100%; height: 100%; }

    #mode-badge {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 99px;
      padding: 8px 18px; font-size: 11px; color: var(--text); pointer-events: none;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    #sidebar {
      position: absolute; top: 20px; right: 20px; width: 260px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      backdrop-filter: blur(2px);
    }
    .btn {
      padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: #050505; color: var(--text); font-size: 12px; cursor: pointer;
      transition: border-color .15s, background .15s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn:hover { border-color: var(--accent); background: rgb(255 43 43 / 12%); }

    .ray-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .ray-item { font-size: 11px; padding: 6px; background: #040404; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); }
    .ray-item strong { color: var(--text); }

    #warning {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      border: 1px solid #ff7171;
      background: rgb(60 0 0 / 90%);
      color: #ffd7d7;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 0.03em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    #warning.show { opacity: 1; }
  </style>
</head>

<body>
  <header>
    <div class="hdot"></div>
    <div>
      <h1>Aiming Ray Capture — Interactive Demo</h1>
      <p>Test the crosshair and tap ray generation purely in 3D space.</p>
    </div>
  </header>

  <main id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="sidebar">
      <button class="btn" onclick="shootCrosshair()">Shoot Center Crosshair (Space)</button>
      <button class="btn" onclick="clearAll()">Clear Rays</button>
      <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 8px;">Captured Rays</div>
      <div class="ray-list" id="ray-list"></div>
    </div>
    <div id="warning" role="status" aria-live="polite"></div>
    <div id="mode-badge">Drag to orbit camera · Click to shoot tap ray · Press Space for center shot</div>
  </main>

  <script type="module">
    import { createTapRay } from './src/utils/aiming-ray-capture.ts';

    const canvas = document.getElementById('c');
    const wrap = document.getElementById('canvas-wrap');
    const ctx = canvas.getContext('2d');
    const warningEl = document.getElementById('warning');
    let W, H, cx, cy;

    // Camera state
    const cam = { az: -0.55, el: 0.34, dist: 9.6 };
    let rays = [];
    const GRID_Y = -2;
    const GRID_EXTENT = 14;

    // Math utils
    const dot3 = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;
    const cross3 = (a, b) => ({ x: a.y * b.z - a.z * b.y, y: a.z * b.x - a.x * b.z, z: a.x * b.y - a.y * b.x });
    const norm3 = v => { const l = Math.sqrt(dot3(v, v)); return l < 1e-12 ? v : { x: v.x / l, y: v.y / l, z: v.z / l }; };

    function getCameraBasis() {
      const P = {
        x: cam.dist * Math.cos(cam.el) * Math.sin(cam.az),
        y: cam.dist * Math.sin(cam.el),
        z: cam.dist * Math.cos(cam.el) * Math.cos(cam.az),
      };
      const fwd = norm3({ x: -P.x, y: -P.y, z: -P.z });
      const right = norm3(cross3(fwd, { x: 0, y: 1, z: 0 }));
      const up = cross3(right, fwd);
      return { P, fwd, right, up };
    }

    // Perspective projection used both for createTapRay and local 3D preview rendering.
    const getProjectionParams = () => {
      const fovY = Math.PI / 3; // 60deg
      const aspect = W / H;
      const near = 0.1;
      const far = 100;
      const f = 1 / Math.tan(fovY / 2);
      return { f, aspect, near, far };
    };

    const getProjectionMatrix = () => {
      const { f, aspect, near, far } = getProjectionParams();
      return [
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) / (near - far), -1,
        0, 0, (2 * far * near) / (near - far), 0
      ];
    };

    function getCameraQuaternion() {
      const { fwd, right, up } = getCameraBasis();
      const m00 = right.x, m01 = up.x, m02 = -fwd.x;
      const m10 = right.y, m11 = up.y, m12 = -fwd.y;
      const m20 = right.z, m21 = up.z, m22 = -fwd.z;
      const tr = m00 + m11 + m22;
      let qw, qx, qy, qz;
      if (tr > 0) {
        const S = Math.sqrt(tr + 1.0) * 2;
        qw = 0.25 * S; qx = (m21 - m12) / S; qy = (m02 - m20) / S; qz = (m10 - m01) / S;
      } else if ((m00 > m11) && (m00 > m22)) {
        const S = Math.sqrt(1.0 + m00 - m11 - m22) * 2;
        qw = (m21 - m12) / S; qx = 0.25 * S; qy = (m01 + m10) / S; qz = (m02 + m20) / S;
      } else if (m11 > m22) {
        const S = Math.sqrt(1.0 + m11 - m00 - m22) * 2;
        qw = (m02 - m20) / S; qx = (m01 + m10) / S; qy = 0.25 * S; qz = (m12 + m21) / S;
      } else {
        const S = Math.sqrt(1.0 + m22 - m00 - m11) * 2;
        qw = (m10 - m01) / S; qx = (m02 + m20) / S; qy = (m12 + m21) / S; qz = 0.25 * S;
      }
      return [qx, qy, qz, qw];
    }

    function project3(wx, wy, wz) {
      const { P, fwd, right, up } = getCameraBasis();
      const v = { x: wx - P.x, y: wy - P.y, z: wz - P.z };
      const vx = dot3(v, right), vy = dot3(v, up), vz = dot3(v, fwd);
      if (vz < 0.1) return null;
      const { f, aspect } = getProjectionParams();
      const ndcX = (vx / vz) * (f / aspect);
      const ndcY = (vy / vz) * f;
      return {
        sx: (ndcX * 0.5 + 0.5) * W,
        sy: (1 - (ndcY * 0.5 + 0.5)) * H,
      };
    }

    function drawLine3(ax, ay, az, bx, by, bz, style, width = 1) {
      const pA = project3(ax, ay, az);
      const pB = project3(bx, by, bz);
      if (pA && pB) {
        ctx.strokeStyle = style; ctx.lineWidth = width;
        ctx.beginPath(); ctx.moveTo(pA.sx, pA.sy); ctx.lineTo(pB.sx, pB.sy); ctx.stroke();
      }
    }

    function drawAxes() {
      // Axis gizmo uses the exact same world basis as the grid (X/Z on plane, Y vertical).
      const baseX = 1.4;
      const baseY = GRID_Y;
      const baseZ = 0.6;
      const axisLen = 5.2;
      drawLine3(baseX, baseY, baseZ, baseX + axisLen, baseY, baseZ, '#f9a825', 2.0); // +X
      drawLine3(baseX, baseY, baseZ, baseX, baseY + axisLen, baseZ, '#9cff00', 2.0); // +Y
      drawLine3(baseX, baseY, baseZ, baseX, baseY, baseZ + axisLen, '#33b5ff', 2.0); // +Z
    }

    function drawGrid() {
      for (let i = -GRID_EXTENT; i <= GRID_EXTENT; i++) {
        const alpha = i === 0 ? 0.62 : (i % 5 === 0 ? 0.44 : 0.24);
        drawLine3(-GRID_EXTENT, GRID_Y, i, GRID_EXTENT, GRID_Y, i, `rgba(255,255,255,${alpha})`);
        drawLine3(i, GRID_Y, -GRID_EXTENT, i, GRID_Y, GRID_EXTENT, `rgba(255,255,255,${alpha})`);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawAxes();

      rays.forEach((ray, i) => {
        // Start a little in front of the camera so the segment is projectable.
        const near = 0.2;
        const far = 24;
        const sx = ray.origin[0] + ray.direction[0] * near;
        const sy = ray.origin[1] + ray.direction[1] * near;
        const sz = ray.origin[2] + ray.direction[2] * near;
        const fx = ray.origin[0] + ray.direction[0] * far;
        const fy = ray.origin[1] + ray.direction[1] * far;
        const fz = ray.origin[2] + ray.direction[2] * far;
        drawLine3(sx, sy, sz, fx, fy, fz, '#ff1414', 2.1);
      });
    }

    let warningTimer = null;
    function showWarning(message) {
      warningEl.textContent = message;
      warningEl.classList.add('show');
      if (warningTimer) clearTimeout(warningTimer);
      warningTimer = setTimeout(() => warningEl.classList.remove('show'), 1800);
    }

    function updateList() {
      const list = document.getElementById('ray-list');
      list.innerHTML = rays.map((r, i) => `
        <div class="ray-item">
          <strong>Ray ${i + 1}</strong><br>
          Origin: ${r.origin.map(v => v.toFixed(2)).join(', ')}<br>
          Dir: ${r.direction.map(v => v.toFixed(2)).join(', ')}
        </div>
      `).join('');
    }

    function handleShoot(screenX, screenY) {
      const { P } = getCameraBasis();
      const rot = getCameraQuaternion();
      const proj = getProjectionMatrix();

      const ray = createTapRay([P.x, P.y, P.z], rot, proj, screenX, screenY);
      if (ray) {
        rays.push(ray);
        updateList();
        draw();
      } else {
        showWarning('Could not create ray for this shot. Try again.');
      }
    }

    window.shootCrosshair = () => { handleShoot(0.5, 0.5); };
    window.clearAll = () => { rays = []; updateList(); draw(); };

    // Interaction
    let drag = null;
    canvas.addEventListener('mousedown', e => { drag = { ax: cam.az, el: cam.el, x: e.offsetX, y: e.offsetY, moved: false }; });
    canvas.addEventListener('mousemove', e => {
      if (drag) {
        const dx = e.offsetX - drag.x, dy = e.offsetY - drag.y;
        if (Math.hypot(dx, dy) > 5) drag.moved = true;
        if (drag.moved) {
          cam.az = drag.ax - dx * 0.007;
          // Keep camera above the grid so perspective remains consistent and intuitive.
          cam.el = Math.max(0.08, Math.min(1.15, drag.el + dy * 0.007));
          draw();
        }
      }
    });
    canvas.addEventListener('mouseup', e => {
      if (drag && !drag.moved) {
        // Normalised coordinates for createTapRay
        handleShoot(e.offsetX / W, e.offsetY / H);
      }
      drag = null;
    });
    canvas.addEventListener('wheel', e => { e.preventDefault(); cam.dist = Math.max(2, Math.min(20, cam.dist + e.deltaY * 0.01)); draw(); }, { passive: false });
    window.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        window.shootCrosshair();
      }
    });

    function resize() { W = canvas.width = wrap.clientWidth; H = canvas.height = wrap.clientHeight; cx = W/2; cy = H/2; draw(); }
    new ResizeObserver(resize).observe(wrap);
  </script>
</body>
</html>
